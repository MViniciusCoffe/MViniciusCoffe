name: Metrics Contributions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MViniciusCoffe
          filename: assets/metrics-contributions.svg

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-history
          plugin_lines: yes
          plugin_lines_sections: total

          config_display: large
          config_theme: dark
          config_padding: 0, 8 + 11%, 0 + 11%
          